name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        if: matrix.node-version < 22
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version >= 22
        run: npm run test:coverage

      - name: Type tests
        run: npm run test:types

      - name: Build
        run: npm run build

      - name: Size check
        run: npm run size

      - name: Verify CJS
        run: >
          node -e "const m = require('./dist/index.cjs'); if (!m.toCamelCase) throw new Error('CJS: toCamelCase not exported')"

      - name: Verify ESM
        run: >
          node -e "import('./dist/index.js').then(m => { if (!m.toCamelCase) throw new Error('ESM: toCamelCase not exported') })"

      - name: Pack dry run
        run: npm pack --dry-run

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci && npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
